<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Отчет</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#0b0b0f;
  color:white;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:420px;
  padding:16px;
}

/* HEADER */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.lang {
  font-size:12px;
  padding:6px 10px;
  background:#1c1c23;
  border-radius:10px;
}

/* TEXT */
h1 {
  text-align:center;
  font-size:22px;
  margin:20px 0;
}

/* CARD */
.card {
  background:#141419;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}

.label {
  font-size:13px;
  color:#9ca3af;
  margin-bottom:6px;
}

/* INPUTS */
input, select, textarea {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#1c1c23;
  color:white;
  font-size:15px;
  box-sizing:border-box;
}

/* FIX textarea */
textarea {
  min-height:90px;
  resize:none;
}

/* BUTTON */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#6d5dfc;
  color:white;
  font-size:16px;
  margin-top:10px;
}

/* SMALL BTN */
.small-btn {
  margin-top:10px;
  background:#1c1c23;
  font-size:12px;
  padding:8px;
}

/* TAGS */
.tag {
  display:inline-block;
  padding:6px 10px;
  margin:4px;
  background:#1c1c23;
  border-radius:10px;
  font-size:12px;
}

.tag.active {
  background:#6d5dfc;
}

/* PIN */
.pin-box {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:30px 0;
}

.pin-cell {
  width:55px;
  height:55px;
  border-radius:12px;
  border:2px solid #333;
  display:flex;
  align-items:center;
  justify-content:center;
}

.pin-cell.active {
  border-color:#6d5dfc;
  background:rgba(109,93,252,0.2);
}

.pin-dot {
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
}

.pin-pad {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.pin-btn {
  width:70px;
  height:70px;
  border-radius:50%;
  background:#1c1c23;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  margin:auto;
}

.pin-btn:active {
  transform:scale(0.9);
}

/* LOADING */
.loader {
  display:flex;
  justify-content:center;
  align-items:center;
  height:60vh;
}

.spinner {
  width:40px;
  height:40px;
  border:4px solid #333;
  border-top:4px solid #6d5dfc;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

.hidden { display:none; }
.success { text-align:center; margin-top:80px; }
</style>
</head>

<body>

<div class="container">

<!-- USERS -->
<div id="users">

<div class="topbar">
<div></div>
<div class="lang">RU / EN / HE</div>
</div>

<h1>Кто менеджер</h1>

<button onclick="selectUser('Егор')">Егор</button>
<button onclick="selectUser('Стас')">Стас</button>

</div>

<!-- PIN -->
<div id="pinScreen" class="hidden">

<h1 id="pinTitle"></h1>

<div class="pin-box">
<div class="pin-cell"></div>
<div class="pin-cell"></div>
<div class="pin-cell"></div>
<div class="pin-cell"></div>
</div>

<div class="pin-pad" id="pinPad"></div>

<p id="pinError" style="color:red;text-align:center;"></p>

</div>

<!-- FORM -->
<div id="form" class="hidden">

<h1>Отчет смены</h1>

<div class="card">
<div class="label">Дата</div>
<input type="date" id="date">
</div>

<div class="card">
<div class="label">Смена</div>
<select id="shift">
<option>Утро</option>
<option>Вечер</option>
</select>
</div>

<div class="card">
<div class="label">Готовность</div>
<select id="ready">
<option>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
</select>
</div>

<div class="card">
<div class="label">Как прошла смена</div>
<textarea id="summary"></textarea>

<button class="small-btn" onclick="toggleTags()">Подсказки</button>
<div id="tags"></div>
</div>

<div class="card">
<div class="label">Команда</div>

<select id="hot">
<option>Горячая</option>
<option>Егор</option><option>Стас</option>
</select>

<select id="cold">
<option>Холодная</option>
<option>Егор</option><option>Стас</option>
</select>

<select id="control">
<option>Проверка</option>
<option>Егор</option><option>Стас</option>
</select>

</div>

<div class="card">
<div class="label">Проблемы</div>
<textarea id="problem"></textarea>
<input type="file" id="photo">
</div>

<button onclick="send()">Отправить</button>

</div>

<!-- LOADING -->
<div id="loading" class="hidden loader">
<div class="spinner"></div>
</div>

<!-- DONE -->
<div id="done" class="hidden success">
<h1>Отчет отправлен ✅</h1>
</div>

</div>

<script>

let user="";
let pin="";

// USER
function selectUser(name){
  user=name;
  pin="";
  renderPin();
  showOnly("pinScreen");
  document.getElementById("pinTitle").innerText=name;
}

// PIN
const pad=document.getElementById("pinPad");

[1,2,3,4,5,6,7,8,9,"←",0].forEach(n=>{
  const b=document.createElement("div");
  b.className="pin-btn";
  b.innerText=n;

  b.onclick=()=>{
    if(n==="←"){ pin=pin.slice(0,-1); }
    else if(pin.length<4){ pin+=n; }

    renderPin();

    if(pin.length===4){ enter(); }
  };

  pad.appendChild(b);
});

function renderPin(){
  const cells=document.querySelectorAll(".pin-cell");

  cells.forEach((c,i)=>{
    c.innerHTML="";
    c.classList.remove("active");

    if(i<pin.length){
      const dot=document.createElement("div");
      dot.className="pin-dot";
      c.appendChild(dot);
    }

    if(i===pin.length){
      c.classList.add("active");
    }
  });
}

// ENTER
function enter(){
  showOnly("form");
  document.getElementById("date").valueAsDate=new Date();
}

// TAGS
function toggleTags(){
  const t=document.getElementById("tags");
  t.style.display = t.style.display==="block" ? "none" : "block";
}

const phrases=["Большая нагрузка","Все прошло спокойно","Были задержки"];

const tagsDiv=document.getElementById("tags");

phrases.forEach(p=>{
  const el=document.createElement("div");
  el.className="tag";
  el.innerText=p;

  el.onclick=()=>{
    el.classList.toggle("active");
    const t=document.getElementById("summary");

    if(el.classList.contains("active")){
      t.value+=(t.value?", ":"")+p;
    }
  };

  tagsDiv.appendChild(el);
});

// SEND
async function send(){

  showOnly("loading");

  const data = {
    user,
    date: document.getElementById("date").value,
    shift: document.getElementById("shift").value,
    ready: document.getElementById("ready").value,
    summary: document.getElementById("summary").value,
    problem: document.getElementById("problem").value,
    hot: document.getElementById("hot").value,
    cold: document.getElementById("cold").value,
    control: document.getElementById("control").value
  };

  try {
    await fetch("https://script.google.com/macros/s/AKfycby6ddtcg8sgvlX_9H33b3cQM2pslzMSxCntDvxgCTXjM5ztPd3HSLYUx9KxOtOiV9Q/exec", {
      method: "POST",
      body: JSON.stringify(data)
    });
  } catch (e) {
    alert("Ошибка отправки");
  }

  showOnly("done");
}
