<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<style>
body{
margin:0;
background:#0a0a0f;
font-family:-apple-system;
color:white;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
padding:16px;
}

/* LANG */
.lang{
display:flex;
gap:6px;
justify-content:center;
margin-bottom:10px;
}

.lang button{
padding:6px 10px;
border-radius:8px;
background:#1c1c24;
border:none;
color:white;
font-size:12px;
}

.lang .active{
background:#6d5dfc;
}

/* CARD */
.card{
background:#15151d;
padding:14px;
border-radius:16px;
margin-bottom:12px;
}

.label{
font-size:13px;
color:#aaa;
margin-bottom:6px;
}

input,select,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#1f1f28;
color:white;
}

textarea{
resize:none;
height:90px;
}

/* BUTTON */
.main{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#6d5dfc,#8b7cff);
color:white;
font-size:16px;
margin-top:10px;
}

.secondary{
background:#1f1f28;
padding:8px 12px;
border-radius:10px;
font-size:12px;
width:auto;
}

/* TAG */
.tag{
display:inline-block;
padding:6px 10px;
background:#1f1f28;
border-radius:10px;
margin:4px;
font-size:12px;
}

.tag.active{
background:#6d5dfc;
}

/* PIN */
.pin-box{
display:flex;
justify-content:center;
gap:10px;
margin:20px 0;
}

.pin-cell{
width:50px;
height:50px;
border-radius:12px;
border:2px solid #333;
display:flex;
align-items:center;
justify-content:center;
}

.pin-dot{
width:8px;
height:8px;
background:white;
border-radius:50%;
}

.pin-pad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
}

.pin-btn{
height:60px;
border-radius:50%;
background:#1c1c24;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="app">

<!-- LANG -->
<div class="lang">
<button onclick="setLang('ru')" class="active">RU</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('he')">HE</button>
</div>

<!-- LOGIN -->
<div id="login">
<h2 id="t1">Кто менеджер</h2>
<button class="main" onclick="selectUser('Егор')">Егор</button>
<button class="main" onclick="selectUser('Стас')">Стас</button>
</div>

<!-- PIN -->
<div id="pin" class="hidden">
<h2 id="t2">Введите PIN</h2>

<div class="pin-box">
<div class="pin-cell"></div>
<div class="pin-cell"></div>
<div class="pin-cell"></div>
<div class="pin-cell"></div>
</div>

<div class="pin-pad" id="pad"></div>
</div>

<!-- FORM -->
<div id="form" class="hidden">

<h2 id="t3">Отчет смены</h2>

<div class="card">
<div class="label">Дата</div>
<input type="date" id="date">
</div>

<div class="card">
<div class="label">Смена</div>
<select id="shift">
<option>Утро</option>
<option>Вечер</option>
</select>
</div>

<div class="card">
<div class="label">Готовность</div>
<select id="ready" onchange="checkReady()">
<option>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
</select>
</div>

<div id="lowBlock" class="card hidden">
<div class="label">Причина</div>
<textarea id="lowReason"></textarea>
<input type="file" id="lowPhoto">
</div>

<div class="card">
<div class="label">Выброс продукции</div>
<div id="waste"></div>
</div>

<div class="card">
<div class="label">Как прошла смена</div>
<textarea id="summary"></textarea>

<div style="display:flex;justify-content:flex-end;">
<button class="secondary" onclick="toggleHints()">Подсказки</button>
</div>

<div id="hints" class="hidden"></div>
</div>

<div class="card">
<div class="label">Проблема</div>
<textarea id="problem"></textarea>
<input type="file" id="problemPhoto">
</div>

<button class="main" onclick="goTraining()">Далее →</button>

</div>

<!-- TRAINING -->
<div id="training" class="hidden">

<h2>Ученичество</h2>

<div class="card">
<div class="label">Выбор ученика</div>
<select id="student">
<option>Алекс</option>
<option>Яков</option>
<option>Егор</option>
</select>
</div>

<div class="card">
<div class="label">Описание ученичества</div>
<textarea id="study"></textarea>
</div>

<button class="main" onclick="send()">Отправить</button>

</div>

<!-- DONE -->
<div id="done" class="hidden">
<h2>Отчет отправлен ✅</h2>
</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycby9W0ZHykeYaN95YUo7C1GcGOHiXtoUWRfqfSbUF3VcJ48mMNMDzDiyVybmNEzVgHA6/exec";

let user="";
let pin="";

/* NAV */
function show(id){
["login","pin","form","training","done"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

/* LOGIN */
function selectUser(name){
user=name;
pin="";
updatePin();
show("pin");
}

/* PIN */
const pad=document.getElementById("pad");

[1,2,3,4,5,6,7,8,9,"←",0].forEach(n=>{
const b=document.createElement("div");
b.className="pin-btn";
b.innerText=n;

b.onclick=()=>{
if(n==="←"){pin=pin.slice(0,-1);}
else if(pin.length<4){pin+=n;}

updatePin();

if(pin.length===4){
setTimeout(()=>{
show("form");
date.valueAsDate=new Date();
},200);
}
};

pad.appendChild(b);
});

function updatePin(){
document.querySelectorAll(".pin-cell").forEach((c,i)=>{
c.innerHTML=i<pin.length?"<div class='pin-dot'></div>":"";
});
}

/* READY */
function checkReady(){
if(ready.value<4){
lowBlock.classList.remove("hidden");
}else{
lowBlock.classList.add("hidden");
}
}

/* PRODUCTS */
const products=["Гуакамоле","Курица","Котлеты","Сальса","Тхина","Перец"];
products.forEach(p=>{
const el=document.createElement("div");
el.className="tag";
el.innerText=p;
el.onclick=()=>el.classList.toggle("active");
waste.appendChild(el);
});

/* HINTS */
function toggleHints(){
hints.classList.toggle("hidden");
hints.innerHTML="Большая нагрузка, нехватка персонала, задержки...";
}

/* NAV */
function goTraining(){
show("training");
}

/* SEND */
async function send(){

const data={
user,
date:date.value,
shift:shift.value,
ready:ready.value,
lowReason:lowReason.value,
summary:summary.value,
problem:problem.value,
student:student.value,
study:study.value
};

await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify(data)
});

show("done");
}

</script>

</body>
</html>
