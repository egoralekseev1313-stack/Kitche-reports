<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<style>
body{
margin:0;
background:#0a0a0f;
font-family:-apple-system;
color:white;
display:flex;
justify-content:center;
}
.app{
width:100%;
max-width:420px;
padding:16px;
}
.card{
background:#15151d;
padding:14px;
border-radius:16px;
margin-bottom:12px;
}
.label{
font-size:13px;
color:#aaa;
margin-bottom:6px;
}
input,select,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#1f1f28;
color:white;
}
textarea{resize:none;height:80px;}
button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#6d5dfc,#8b7cff);
color:white;
margin-top:10px;
}
.hidden{display:none;}
.tag{
display:inline-block;
padding:6px 10px;
background:#1f1f28;
border-radius:10px;
margin:4px;
}
.tag.active{background:#6d5dfc;}
</style>
</head>

<body>
<div class="app">

<div id="login">
<h2>Менеджер</h2>
<button onclick="selectUser('Егор')">Егор</button>
<button onclick="selectUser('Стас')">Стас</button>
</div>

<div id="form" class="hidden">

<h2>Отчет</h2>

<div class="card">
<div class="label">Дата</div>
<input type="date" id="date">
</div>

<div class="card">
<div class="label">Смена</div>
<select id="shift">
<option>Утро</option>
<option>Вечер</option>
</select>
</div>

<div class="card">
<div class="label">Готовность</div>
<select id="ready" onchange="checkReady()">
<option>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
</select>
</div>

<div id="lowBlock" class="card hidden">
<div class="label">Почему</div>
<textarea id="lowReason"></textarea>
<input type="file" id="lowPhoto">
</div>

<div class="card">
<div class="label">Выброс</div>
<div id="waste"></div>
</div>

<div class="card">
<div class="label">Описание смены</div>
<textarea id="summary"></textarea>
<button onclick="toggleHints()">Подсказки</button>
<div id="hints" class="hidden"></div>
</div>

<div class="card">
<div class="label">Проблема</div>
<textarea id="problem"></textarea>
<input type="file" id="problemPhoto">
</div>

<button onclick="goTraining()">Далее →</button>

</div>

<div id="training" class="hidden">
<h2>Ученичество</h2>

<div class="card">
<select id="student">
<option>Алекс</option>
<option>Яков</option>
<option>Егор</option>
</select>
</div>

<div class="card">
<textarea id="study"></textarea>
</div>

<button onclick="send()">Отправить</button>

</div>

<div id="done" class="hidden">
<h2>Готово ✅</h2>
</div>

</div>

<script>

const SCRIPT_URL="ВСТАВЬ СЮДА";

let user="";

function selectUser(name){
user=name;
document.getElementById("login").classList.add("hidden");
document.getElementById("form").classList.remove("hidden");
date.valueAsDate=new Date();
}

function checkReady(){
if(ready.value<4){
lowBlock.classList.remove("hidden");
}else{
lowBlock.classList.add("hidden");
}
}

const products=["Гуакамоле","Курица","Котлеты","Сальса","Тхина","Перец"];
const wasteDiv=document.getElementById("waste");

products.forEach(p=>{
const t=document.createElement("div");
t.className="tag";
t.innerText=p;
t.onclick=()=>t.classList.toggle("active");
wasteDiv.appendChild(t);
});

function toggleHints(){
hints.classList.toggle("hidden");
hints.innerHTML="Большая нагрузка, нехватка персонала...";
}

function goTraining(){
form.classList.add("hidden");
training.classList.remove("hidden");
}

async function send(){

const data={
user,
date:date.value,
shift:shift.value,
ready:ready.value,
lowReason:lowReason.value,
summary:summary.value,
problem:problem.value,
student:student.value,
study:study.value
};

await fetch(https://script.google.com/macros/s/AKfycby6ddtcg8sgvlX_9H33b3cQM2pslzMSxCntDvxgCTXjM5ztPd3HSLYUx9KxOtOiV9Q/exec,{
method:"POST",
body:JSON.stringify(data)
});

training.classList.add("hidden");
done.classList.remove("hidden");
}

</script>

</body>
</html>
