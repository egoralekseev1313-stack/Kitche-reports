<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отчет кухни</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#0b0b0f;
  color:white;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:420px;
  padding:20px;
}

/* TEXT */
h1 {
  text-align:center;
  font-size:24px;
  margin:30px 0;
}

/* CARDS */
.card {
  background:#141419;
  border-radius:16px;
  padding:16px;
  margin-bottom:14px;
}

.label {
  font-size:13px;
  color:#9ca3af;
  margin-bottom:6px;
}

/* INPUTS */
input, select, textarea {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1c1c23;
  color:white;
  font-size:15px;
}

textarea { min-height:80px; }

/* BUTTON */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#6d5dfc;
  color:white;
  font-size:16px;
  margin-top:10px;
}

button:active { transform:scale(0.96); }

/* SMALL BTN */
.small-btn {
  background:#1c1c23;
  padding:6px 10px;
  font-size:12px;
  border-radius:10px;
  width:auto;
}

/* ROW */
.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* TAGS */
.tag {
  display:inline-block;
  padding:8px 10px;
  margin:4px;
  background:#1c1c23;
  border-radius:10px;
  font-size:13px;
}

.tag.active {
  background:#6d5dfc;
}

#tags {
  display:none;
  margin-top:10px;
}

/* PIN */
.pin-box {
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:40px;
}

.pin-cell {
  width:60px;
  height:60px;
  border-radius:14px;
  border:2px solid #333;
  display:flex;
  align-items:center;
  justify-content:center;
}

.pin-cell.active {
  border-color:#6d5dfc;
  background:rgba(109,93,252,0.2);
}

.pin-dot {
  width:10px;
  height:10px;
  background:white;
  border-radius:50%;
}

.pin-pad {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  padding:0 30px;
}

.pin-btn {
  width:80px;
  height:80px;
  border-radius:50%;
  background:#1a1a1f;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  margin:auto;
}

.pin-btn:active {
  transform:scale(0.9);
  background:#2a2a33;
}

.hidden { display:none; }
.success { text-align:center; margin-top:100px; }
</style>
</head>

<body>

<div class="container">

<!-- USERS -->
<div id="users">
<h1>Кто менеджер</h1>
<button onclick="selectUser('Егор')">Егор</button>
<button onclick="selectUser('Стас')">Стас</button>
</div>

<!-- PIN -->
<div id="pinScreen" class="hidden">
<h1 id="pinTitle"></h1>

<div class="pin-box">
<div class="pin-cell"></div>
<div class="pin-cell"></div>
<div class="pin-cell"></div>
<div class="pin-cell"></div>
</div>

<div class="pin-pad" id="pinPad"></div>
<p id="pinError" style="color:red;text-align:center;"></p>
</div>

<!-- FORM -->
<div id="form" class="hidden">

<h1>Отчет смены</h1>

<div class="card">
<div class="label">Дата</div>
<input type="date" id="date">
</div>

<div class="card">
<div class="label">Смена</div>
<select id="shift">
<option>Утро</option>
<option>Вечер</option>
</select>
</div>

<div class="card">
<div class="label">Готовность</div>
<select id="ready" onchange="toggleLow()">
<option>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
</select>

<div id="lowBlock" class="hidden">
<textarea id="lowComment" placeholder="Причина"></textarea>
<input type="file" id="photoReady">
</div>
</div>

<div class="card">
<div class="row">
<div class="label">Как прошла смена</div>
<button class="small-btn" onclick="toggleTags()">Подсказки</button>
</div>

<textarea id="summary"></textarea>
<div id="tags"></div>
</div>

<div class="card">
<div class="label">Команда</div>

<select id="hot">
<option value="">Горячая</option>
<option>Егор</option><option>Стас</option><option>Яков</option><option>Алекс</option><option>Денис</option>
</select>

<select id="cold">
<option value="">Холодная</option>
<option>Егор</option><option>Стас</option><option>Яков</option><option>Алекс</option><option>Денис</option>
</select>

<select id="control">
<option value="">Проверка</option>
<option>Егор</option><option>Стас</option><option>Яков</option><option>Алекс</option><option>Денис</option>
</select>
</div>

<div class="card">
<div class="label">Проблемы</div>
<textarea id="problem"></textarea>
<input type="file" id="photoProblem">
</div>

<button onclick="send()">Отправить</button>

</div>

<!-- DONE -->
<div id="done" class="hidden success">
<h1>Готово ✅</h1>
<button onclick="location.reload()">Новый отчет</button>
</div>

</div>

<script>

let user="";
let pin="";

// USER
function selectUser(name){
  user=name;
  pin="";
  renderPin();
  hideAll();
  show("pinScreen");
  document.getElementById("pinTitle").innerText=name;
}

// PIN
const pad=document.getElementById("pinPad");

[1,2,3,4,5,6,7,8,9,"←",0].forEach(n=>{
  const b=document.createElement("div");
  b.className="pin-btn";
  b.innerText=n;

  b.onclick=()=>{
    if(n==="←"){ pin=pin.slice(0,-1); }
    else if(pin.length<4){ pin+=n; }

    renderPin();

    if(pin.length===4){ login(pin); }
  };

  pad.appendChild(b);
});

function renderPin(){
  const cells=document.querySelectorAll(".pin-cell");

  cells.forEach((c,i)=>{
    c.innerHTML="";
    c.classList.remove("active");

    if(i<pin.length){
      const dot=document.createElement("div");
      dot.className="pin-dot";
      c.appendChild(dot);
    }

    if(i===pin.length){
      c.classList.add("active");
    }
  });
}

// LOGIN
function login(p){
  const saved=localStorage.getItem("pin_"+user);

  if(!saved){
    localStorage.setItem("pin_"+user,p);
    enter();
  } else if(saved===p){
    enter();
  } else {
    document.getElementById("pinError").innerText="Неверный PIN";
    pin="";
    renderPin();
  }
}

function enter(){
  hideAll();
  show("form");
  document.getElementById("date").valueAsDate=new Date();
}

// LOW
function toggleLow(){
  const val=document.getElementById("ready").value;
  document.getElementById("lowBlock").classList.toggle("hidden", val>=4);
}

// TAGS
function toggleTags(){
  const t=document.getElementById("tags");
  t.style.display = t.style.display==="block" ? "none" : "block";
}

const phrases=[
"Большая нагрузка","Нехватка персонала","Смена спокойная",
"Были задержки","Высокий поток заказов","Ошибки",
"Проблемы с поставками","Очереди","Все прошло отлично"
];

const tagsDiv=document.getElementById("tags");

phrases.forEach(p=>{
  const el=document.createElement("div");
  el.className="tag";
  el.innerText=p;

  el.onclick=()=>{
    el.classList.toggle("active");
    const t=document.getElementById("summary");

    if(el.classList.contains("active")){
      t.value+=(t.value?", ":"")+p;
    } else {
      t.value=t.value.replace(p,"");
    }
  };

  tagsDiv.appendChild(el);
});

// SEND
async function send(){
  const data={
    user,
    date:document.getElementById("date").value,
    shift:document.getElementById("shift").value,
    ready:document.getElementById("ready").value,
    summary:document.getElementById("summary").value
  };

  await fetch("https://script.google.com/macros/s/AKfycby6ddtcg8sgvlX_9H33b3cQM2pslzMSxCntDvxgCTXjM5ztPd3HSLYUx9KxOtOiV9Q/exec", {
    method:"POST",
    body:JSON.stringify(data)
  });

  hideAll();
  show("done");
}

// HELPERS
function hideAll(){
  document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
}
function show(id){
  document.getElementById(id).classList.remove("hidden");
}

</script>

</body>
</html>
