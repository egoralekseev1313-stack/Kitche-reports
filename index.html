<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#0b0b0f;
  color:white;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:420px;
  padding:16px;
}

/* LANGUAGE */
.lang-switch {
  display:flex;
  gap:6px;
}

.lang-btn {
  padding:6px 10px;
  font-size:12px;
  border-radius:10px;
  background:#1c1c23;
}

.lang-btn.active {
  background:#6d5dfc;
}

/* TEXT */
h1 {
  text-align:center;
  font-size:22px;
  margin:20px 0;
}

.card {
  background:#141419;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}

.label {
  font-size:13px;
  color:#9ca3af;
  margin-bottom:6px;
}

input, select, textarea {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#1c1c23;
  color:white;
  font-size:15px;
  box-sizing:border-box;
}

textarea {
  min-height:90px;
  resize:none;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#6d5dfc;
  color:white;
  font-size:16px;
  margin-top:10px;
}

/* TAGS */
.tag {
  display:inline-block;
  padding:6px 10px;
  margin:4px;
  background:#1c1c23;
  border-radius:10px;
  font-size:12px;
}

.tag.active {
  background:#6d5dfc;
}

/* PIN */
.pin-box {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:30px 0;
}

.pin-cell {
  width:55px;
  height:55px;
  border-radius:12px;
  border:2px solid #333;
  display:flex;
  align-items:center;
  justify-content:center;
}

.pin-cell.active {
  border-color:#6d5dfc;
}

.pin-dot {
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
}

.pin-pad {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.pin-btn {
  width:70px;
  height:70px;
  border-radius:50%;
  background:#1c1c23;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hidden { display:none; }

/* LOADING */
.loader {
  display:flex;
  justify-content:center;
  align-items:center;
  height:60vh;
}

.spinner {
  width:40px;
  height:40px;
  border:4px solid #333;
  border-top:4px solid #6d5dfc;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">

<!-- USERS -->
<div id="users">

<div class="lang-switch">
<div class="lang-btn active" onclick="setLang('ru')">RU</div>
<div class="lang-btn" onclick="setLang('en')">EN</div>
<div class="lang-btn" onclick="setLang('he')">HE</div>
</div>

<h1 id="titleManagers">Кто менеджер</h1>

<button onclick="selectUser('Егор')">Егор</button>
<button onclick="selectUser('Стас')">Стас</button>

</div>

<!-- PIN -->
<div id="pinScreen" class="hidden">
<h1 id="pinTitle"></h1>

<div class="pin-box">
<div class="pin-cell"></div>
<div class="pin-cell"></div>
<div class="pin-cell"></div>
<div class="pin-cell"></div>
</div>

<div class="pin-pad" id="pinPad"></div>
</div>

<!-- FORM -->
<div id="form" class="hidden">

<h1 id="titleReport">Отчет смены</h1>

<div class="card">
<div class="label" id="labelDate">Дата</div>
<input type="date" id="date">
</div>

<div class="card">
<div class="label" id="labelShift">Смена</div>
<select id="shift">
<option id="shiftMorning">Утро</option>
<option id="shiftEvening">Вечер</option>
</select>
</div>

<div class="card">
<div class="label" id="labelReady">Готовность</div>
<select id="ready">
<option>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
</select>
</div>

<div class="card">
<div class="label" id="labelSummary">Как прошла смена</div>
<textarea id="summary"></textarea>
</div>

<div class="card">
<div class="label" id="labelProblem">Проблемы</div>
<textarea id="problem"></textarea>
</div>

<button onclick="send()" id="btnSend">Отправить</button>

</div>

<!-- LOADING -->
<div id="loading" class="hidden loader">
<div class="spinner"></div>
</div>

<!-- DONE -->
<div id="done" class="hidden">
<h1 id="doneText">Отчет отправлен</h1>
</div>

</div>

<script>

let lang = "ru";

const translations = {
ru:{
managers:"Кто менеджер",
report:"Отчет смены",
date:"Дата",
shift:"Смена",
morning:"Утро",
evening:"Вечер",
ready:"Готовность",
summary:"Как прошла смена",
problem:"Проблемы",
send:"Отправить",
done:"Отчет отправлен"
},
en:{
managers:"Manager",
report:"Shift report",
date:"Date",
shift:"Shift",
morning:"Morning",
evening:"Evening",
ready:"Readiness",
summary:"Shift summary",
problem:"Problems",
send:"Send",
done:"Report sent"
},
he:{
managers:"מנהל",
report:"דוח משמרת",
date:"תאריך",
shift:"משמרת",
morning:"בוקר",
evening:"ערב",
ready:"מוכנות",
summary:"איך עברה המשמרת",
problem:"בעיות",
send:"שלח",
done:"הדוח נשלח"
}
};

// LANGUAGE SWITCH
function setLang(l){
  lang = l;

  document.querySelectorAll(".lang-btn").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");

  const t = translations[l];

  document.getElementById("titleManagers").innerText = t.managers;
  document.getElementById("titleReport").innerText = t.report;
  document.getElementById("labelDate").innerText = t.date;
  document.getElementById("labelShift").innerText = t.shift;
  document.getElementById("shiftMorning").innerText = t.morning;
  document.getElementById("shiftEvening").innerText = t.evening;
  document.getElementById("labelReady").innerText = t.ready;
  document.getElementById("labelSummary").innerText = t.summary;
  document.getElementById("labelProblem").innerText = t.problem;
  document.getElementById("btnSend").innerText = t.send;
  document.getElementById("doneText").innerText = t.done;
}

// PIN
let user="";
let pin="";

function selectUser(name){
  user=name;
  showOnly("pinScreen");
}

const pad=document.getElementById("pinPad");

[1,2,3,4,5,6,7,8,9,"←",0].forEach(n=>{
  const b=document.createElement("div");
  b.className="pin-btn";
  b.innerText=n;

  b.onclick=()=>{
    if(n==="←"){ pin=pin.slice(0,-1); }
    else if(pin.length<4){ pin+=n; }

    if(pin.length===4){ enter(); }
  };

  pad.appendChild(b);
});

function enter(){
  showOnly("form");
  document.getElementById("date").valueAsDate=new Date();
}

// SEND
async function send(){

  showOnly("loading");

  const data = {
    user,
    date:document.getElementById("date").value,
    shift:document.getElementById("shift").value
  };

  await fetch("https://script.google.com/macros/s/AKfycby6ddtcg8sgvlX_9H33b3cQM2pslzMSxCntDvxgCTXjM5ztPd3HSLYUx9KxOtOiV9Q/exec", {
    method:"POST",
    body:JSON.stringify(data)
  });

  showOnly("done");
}

// HELPERS
function showOnly(id){
  document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

</script>

</body>
</html>
