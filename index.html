<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отчет кухни</title>

<style>
body {
  font-family: -apple-system, Arial;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
  display:flex;
  justify-content:center;
}

.box {
  width:100%;
  max-width:420px;
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

h2 { text-align:center; }

button {
  width:100%;
  padding:16px;
  margin:10px 0;
  border-radius:14px;
  font-size:18px;
  border:none;
  background:#1f2937;
  color:white;
  transition:0.2s;
}

button:active {
  transform:scale(0.96);
}

input, select, textarea {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  font-size:16px;
}

.hidden { display:none; }

.card {
  background:#1e293b;
  padding:15px;
  border-radius:16px;
  margin-top:15px;
}

.tag {
  display:inline-block;
  padding:10px 14px;
  margin:5px;
  background:#334155;
  border-radius:12px;
  font-size:14px;
  transition:0.2s;
}

.tag.active {
  background:#22c55e;
}

#tags {
  max-height:0;
  overflow:hidden;
  transition:0.3s;
}

#tags.show {
  max-height:300px;
}

.success {
  text-align:center;
  margin-top:100px;
}
</style>
</head>

<body>

<div class="box">

<!-- USER -->
<div id="screenUsers">
<h2>Кто менеджер?</h2>
<button onclick="selectUser('Егор')">👤 Егор</button>
<button onclick="selectUser('Стас')">👤 Стас</button>
</div>

<!-- PIN CREATE -->
<div id="screenCreate" class="hidden">
<h2 id="createName"></h2>
<input id="createPin" placeholder="Создай PIN" maxlength="4">
<button onclick="savePin()">Сохранить</button>
</div>

<!-- LOGIN -->
<div id="screenLogin" class="hidden">
<h2 id="loginName"></h2>
<input id="loginPin" placeholder="Введите PIN" maxlength="4">
<button onclick="login()">Войти</button>
<p id="error" style="color:red;"></p>
</div>

<!-- FORM -->
<div id="screenForm" class="hidden">

<h2>Отчет смены</h2>

<div class="card">
<select id="shift">
<option>Утро</option>
<option>Вечер</option>
</select>
</div>

<div class="card">
<h3>Готовность</h3>
<select id="ready" onchange="toggleLow()">
<option>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
</select>

<div id="lowBlock" class="hidden">
<textarea id="lowComment" placeholder="Почему не готово"></textarea>
<input type="file" id="photoReady" accept="image/*" capture="environment">
</div>
</div>

<div class="card">
<h3>Как прошла смена</h3>

<textarea id="summary" placeholder="Опиши смену"></textarea>

<button onclick="toggleTags()">Подсказки ▼</button>

<div id="tags"></div>
</div>

<div class="card">
<h3>Команда</h3>

<label>🔥 Горячая</label>
<select id="hot">
<option value="">—</option>
<option>Егор</option><option>Стас</option><option>Яков</option><option>Алекс</option><option>Денис</option>
</select>

<label>🥗 Холодная</label>
<select id="cold">
<option value="">—</option>
<option>Егор</option><option>Стас</option><option>Яков</option><option>Алекс</option><option>Денис</option>
</select>

<label>👀 Проверка</label>
<select id="control">
<option value="">—</option>
<option>Егор</option><option>Стас</option><option>Яков</option><option>Алекс</option><option>Денис</option>
</select>
</div>

<div class="card">
<h3>Проблемы</h3>
<textarea id="problem" placeholder="Опиши проблему"></textarea>
<input type="file" id="photoProblem" accept="image/*" capture="environment">
</div>

<button onclick="send()">Отправить</button>

</div>

<!-- DONE -->
<div id="screenDone" class="hidden success">
<h2>✅ Отчет отправлен</h2>
<p>Спасибо 🙌</p>
<button onclick="location.reload()">Новый отчет</button>
</div>

</div>

<script>

let currentUser = "";

// USER
function selectUser(name){
  currentUser = name;
  const saved = localStorage.getItem("pin_"+name);

  hideAll();

  if(saved){
    show("screenLogin");
    document.getElementById("loginName").innerText = name;
  } else {
    show("screenCreate");
    document.getElementById("createName").innerText = name;
  }
}

// PIN
function savePin(){
  const pin = document.getElementById("createPin").value;

  if(pin.length !== 4){
    alert("4 цифры");
    return;
  }

  localStorage.setItem("pin_"+currentUser, pin);
  hideAll();
  show("screenLogin");
}

// LOGIN
function login(){
  const saved = localStorage.getItem("pin_"+currentUser);
  const input = document.getElementById("loginPin").value;

  if(saved == input){
    hideAll();
    show("screenForm");
  } else {
    document.getElementById("error").innerText = "Неверный PIN";
  }
}

// READY
function toggleLow(){
  const val = document.getElementById("ready").value;
  document.getElementById("lowBlock").classList.toggle("hidden", val >= 4);
}

// TAGS
let tagsVisible = false;

function toggleTags(){
  const el = document.getElementById("tags");
  tagsVisible = !tagsVisible;
  el.classList.toggle("show", tagsVisible);
}

const phrases = [
"Большая нагрузка","Нехватка персонала","Смена прошла спокойно",
"Были задержки","Высокий поток заказов","Ошибки в заказах",
"Проблемы с поставками","Очереди","Долгая отдача","Все шло идеально"
];

const tagsDiv = document.getElementById("tags");

phrases.forEach(p=>{
  const el = document.createElement("div");
  el.innerText = p;
  el.className = "tag";

  el.onclick = ()=>{
    const t = document.getElementById("summary");

    el.classList.toggle("active");

    if(el.classList.contains("active")){
      t.value += (t.value ? ", " : "") + p;
    } else {
      t.value = t.value.replace(p+", ","").replace(p,"");
    }
  };

  tagsDiv.appendChild(el);
});

// BASE64
function toBase64(file){
  return new Promise(res=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result.split(',')[1]);
    r.readAsDataURL(file);
  });
}

// SEND
async function send(){

  const data = {
    pin: currentUser,
    shift: document.getElementById("shift").value,
    ready: document.getElementById("ready").value,
    lowComment: document.getElementById("lowComment").value,
    summary: document.getElementById("summary").value,
    hot: document.getElementById("hot").value,
    cold: document.getElementById("cold").value,
    control: document.getElementById("control").value,
    problem: document.getElementById("problem").value
  };

  const f1 = document.getElementById("photoReady").files[0];
  if(f1) data.imageReady = await toBase64(f1);

  const f2 = document.getElementById("photoProblem").files[0];
  if(f2) data.imageProblem = await toBase64(f2);

  await fetch("https://script.google.com/macros/s/AKfycby6ddtcg8sgvlX_9H33b3cQM2pslzMSxCntDvxgCTXjM5ztPd3HSLYUx9KxOtOiV9Q/exec", {
    method:"POST",
    body: JSON.stringify(data)
  });

  hideAll();
  show("screenDone");
}

// HELPERS
function hideAll(){
  document.querySelectorAll(".box > div").forEach(d=>d.classList.add("hidden"));
}

function show(id){
  document.getElementById(id).classList.remove("hidden");
}

</script>

</body>
</html>
