<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отчет кухни</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: linear-gradient(180deg,#0f172a,#020617);
  color: #e2e8f0;
  margin:0;
  padding:20px;
  display:flex;
  justify-content:center;
}

.box {
  width:100%;
  max-width:420px;
}

.card {
  background: rgba(30,41,59,0.6);
  backdrop-filter: blur(10px);
  border-radius:18px;
  padding:18px;
  margin-top:15px;
  border:1px solid rgba(255,255,255,0.05);
}

h2 { text-align:center; }
h3 { font-size:15px; color:#94a3b8; }

input, select, textarea {
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
  font-size:15px;
}

button {
  width:100%;
  padding:16px;
  border-radius:16px;
  border:none;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  font-size:17px;
  margin-top:15px;
}

.small-btn {
  width:auto;
  padding:6px 10px;
  font-size:12px;
  background:#1e293b;
}

.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.tag {
  display:inline-block;
  padding:8px 12px;
  margin:4px;
  background:#1e293b;
  border-radius:10px;
  font-size:13px;
}

.tag.active {
  background:#22c55e;
}

#tags {
  max-height:0;
  overflow:hidden;
  transition:0.3s;
}

#tags.show {
  max-height:300px;
}

/* PIN */
.dot {
  width:12px;
  height:12px;
  border-radius:50%;
  border:2px solid #64748b;
  margin:6px;
}

.dot.active {
  background:#22c55e;
  border:none;
}

#pinPad {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

.pinBtn {
  padding:20px;
  background:#1e293b;
  border-radius:16px;
  text-align:center;
  font-size:20px;
}

.hidden { display:none; }

.success {
  text-align:center;
  margin-top:100px;
}
</style>
</head>

<body>

<div class="box">

<!-- USER -->
<div id="screenUsers">
<h2>Кто менеджер?</h2>
<button onclick="selectUser('Егор')">Егор</button>
<button onclick="selectUser('Стас')">Стас</button>
</div>

<!-- PIN -->
<div id="screenPin" class="hidden">
<h2 id="pinTitle"></h2>

<div id="pinDots" style="display:flex;justify-content:center;">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<div id="pinPad"></div>

<p id="pinError" style="color:red;text-align:center;"></p>
</div>

<!-- FORM -->
<div id="screenForm" class="hidden">

<h2>Отчет смены</h2>

<div class="card">
<h3>Дата</h3>
<input type="date" id="date">
</div>

<div class="card">
<h3>Смена</h3>
<select id="shift">
<option>Утро</option>
<option>Вечер</option>
</select>
</div>

<div class="card">
<h3>Готовность</h3>
<select id="ready" onchange="toggleLow()">
<option>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
</select>

<div id="lowBlock" class="hidden">
<textarea id="lowComment" placeholder="Почему не готово"></textarea>
<input type="file" id="photoReady" accept="image/*" capture="environment">
</div>
</div>

<div class="card">
<div class="row">
<h3>Как прошла смена</h3>
<button class="small-btn" onclick="toggleTags()">Подсказки</button>
</div>

<textarea id="summary" placeholder="Опиши смену"></textarea>
<div id="tags"></div>
</div>

<div class="card">
<h3>Команда</h3>

<select id="hot">
<option value="">— Горячая</option>
<option>Егор</option><option>Стас</option><option>Яков</option><option>Алекс</option><option>Денис</option>
</select>

<select id="cold">
<option value="">— Холодная</option>
<option>Егор</option><option>Стас</option><option>Яков</option><option>Алекс</option><option>Денис</option>
</select>

<select id="control">
<option value="">— Проверка</option>
<option>Егор</option><option>Стас</option><option>Яков</option><option>Алекс</option><option>Денис</option>
</select>
</div>

<div class="card">
<h3>Проблемы</h3>
<textarea id="problem"></textarea>
<input type="file" id="photoProblem" accept="image/*" capture="environment">
</div>

<button onclick="send()">Отправить</button>

</div>

<!-- DONE -->
<div id="screenDone" class="hidden success">
<h2>Отчет отправлен ✅</h2>
<button onclick="location.reload()">Новый отчет</button>
</div>

</div>

<script>

let currentUser = "";
let pin = "";

// USER
function selectUser(name){
  currentUser = name;
  pin = "";
  updateDots();

  hideAll();
  show("screenPin");
  document.getElementById("pinTitle").innerText = name;
}

// PIN PAD
const pad = document.getElementById("pinPad");

[1,2,3,4,5,6,7,8,9,"←",0].forEach(n=>{
  const b = document.createElement("div");
  b.className = "pinBtn";
  b.innerText = n;

  b.onclick = ()=>{
    if(n==="←"){
      pin = pin.slice(0,-1);
    } else if(pin.length < 4){
      pin += n;
    }

    updateDots();

    if(pin.length === 4){
      login(pin);
    }
  };

  pad.appendChild(b);
});

function updateDots(){
  document.querySelectorAll(".dot").forEach((d,i)=>{
    d.classList.toggle("active", i < pin.length);
  });
}

// LOGIN
function login(p){
  const saved = localStorage.getItem("pin_"+currentUser);

  if(!saved){
    localStorage.setItem("pin_"+currentUser, p);
    enter();
  } else if(saved === p){
    enter();
  } else {
    document.getElementById("pinError").innerText = "Неверный PIN";
    pin="";
    updateDots();
  }
}

function enter(){
  hideAll();
  show("screenForm");

  // авто дата сегодня
  document.getElementById("date").valueAsDate = new Date();
}

// READY
function toggleLow(){
  const val = document.getElementById("ready").value;
  document.getElementById("lowBlock").classList.toggle("hidden", val >= 4);
}

// TAGS
function toggleTags(){
  document.getElementById("tags").classList.toggle("show");
}

const phrases = [
"Большая нагрузка","Нехватка персонала","Смена прошла спокойно",
"Были задержки","Высокий поток заказов","Ошибки в заказах",
"Проблемы с поставками","Очереди","Долгая отдача","Все шло идеально"
];

const tagsDiv = document.getElementById("tags");

phrases.forEach(p=>{
  const el = document.createElement("div");
  el.innerText = p;
  el.className = "tag";

  el.onclick = ()=>{
    const t = document.getElementById("summary");
    el.classList.toggle("active");

    if(el.classList.contains("active")){
      t.value += (t.value ? ", " : "") + p;
    } else {
      t.value = t.value.replace(p+", ","").replace(p,"");
    }
  };

  tagsDiv.appendChild(el);
});

// BASE64
function toBase64(file){
  return new Promise(res=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result.split(',')[1]);
    r.readAsDataURL(file);
  });
}

// SEND
async function send(){

  const data = {
    pin: currentUser,
    date: document.getElementById("date").value,
    shift: document.getElementById("shift").value,
    ready: document.getElementById("ready").value,
    lowComment: document.getElementById("lowComment").value,
    summary: document.getElementById("summary").value,
    hot: document.getElementById("hot").value,
    cold: document.getElementById("cold").value,
    control: document.getElementById("control").value,
    problem: document.getElementById("problem").value
  };

  const f1 = document.getElementById("photoReady").files[0];
  if(f1) data.imageReady = await toBase64(f1);

  const f2 = document.getElementById("photoProblem").files[0];
  if(f2) data.imageProblem = await toBase64(f2);

  await fetch("https://script.google.com/macros/s/AKfycby6ddtcg8sgvlX_9H33b3cQM2pslzMSxCntDvxgCTXjM5ztPd3HSLYUx9KxOtOiV9Q/exec", {
    method:"POST",
    body: JSON.stringify(data)
  });

  hideAll();
  show("screenDone");
}

// HELPERS
function hideAll(){
  document.querySelectorAll(".box > div").forEach(d=>d.classList.add("hidden"));
}

function show(id){
  document.getElementById(id).classList.remove("hidden");
}

</script>

</body>
</html>
