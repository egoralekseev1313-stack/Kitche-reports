<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#0a0a0f;
font-family:-apple-system;
color:white;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
padding:16px;
}

/* LANGUAGE */
.lang{
display:flex;
gap:6px;
justify-content:center;
margin-bottom:10px;
}

.lang button{
padding:6px 10px;
border-radius:8px;
background:#1c1c24;
border:none;
color:white;
font-size:12px;
}

.lang .active{
background:#6d5dfc;
}

/* TITLE */
h1{
text-align:center;
font-size:22px;
margin:20px 0;
}

/* BUTTON */
.main-btn{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:linear-gradient(135deg,#6d5dfc,#8b7cff);
color:white;
font-size:16px;
margin-top:10px;
}

/* CARD */
.card{
background:#15151d;
border-radius:16px;
padding:14px;
margin-bottom:12px;
}

.label{
font-size:13px;
color:#aaa;
margin-bottom:6px;
}

input, select, textarea{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#1f1f28;
color:white;
font-size:15px;
box-sizing:border-box;
}

textarea{
resize:none;
height:90px;
}

/* PIN */
.pin-wrap{
text-align:center;
}

.pin-box{
display:flex;
justify-content:center;
gap:10px;
margin:20px 0;
}

.pin-cell{
width:50px;
height:50px;
border:2px solid #333;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
}

.pin-dot{
width:8px;
height:8px;
background:white;
border-radius:50%;
}

.pin-pad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
justify-items:center;
}

.pin-btn{
width:70px;
height:70px;
border-radius:50%;
background:#1c1c24;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="app">

<!-- LANGUAGE -->
<div class="lang">
<button onclick="setLang('ru')" id="lru" class="active">RU</button>
<button onclick="setLang('en')" id="len">EN</button>
<button onclick="setLang('he')" id="lhe">HE</button>
</div>

<!-- USERS -->
<div id="users">
<h1 id="t1">Кто менеджер</h1>
<button class="main-btn" onclick="selectUser('Егор')">Егор</button>
<button class="main-btn" onclick="selectUser('Стас')">Стас</button>
</div>

<!-- PIN -->
<div id="pin" class="hidden pin-wrap">
<h1 id="t2">Введите PIN</h1>

<div class="pin-box" id="pinBox">
<div class="pin-cell"></div>
<div class="pin-cell"></div>
<div class="pin-cell"></div>
<div class="pin-cell"></div>
</div>

<div class="pin-pad" id="pad"></div>
</div>

<!-- FORM -->
<div id="form" class="hidden">

<h1 id="t3">Отчет смены</h1>

<div class="card">
<div class="label">Дата</div>
<input type="date" id="date">
</div>

<div class="card">
<div class="label">Смена</div>
<select id="shift">
<option>Утро</option>
<option>Вечер</option>
</select>
</div>

<div class="card">
<div class="label">Готовность</div>
<select id="ready">
<option>5</option>
<option>4</option>
<option>3</option>
<option>2</option>
<option>1</option>
</select>
</div>

<div class="card">
<div class="label">Как прошла смена</div>
<textarea id="summary"></textarea>
</div>

<div class="card">
<div class="label">Проблемы</div>
<textarea id="problem"></textarea>
</div>

<button class="main-btn" onclick="send()">Отправить</button>

</div>

<!-- DONE -->
<div id="done" class="hidden">
<h1>Отчет отправлен ✅</h1>
</div>

</div>

<script>

let user="";
let pin="";

/* LANG */
function setLang(l){
document.querySelectorAll(".lang button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

if(l==="en"){
t1.innerText="Manager";
t2.innerText="Enter PIN";
t3.innerText="Shift report";
}
if(l==="he"){
t1.innerText="מנהל";
t2.innerText="הכנס קוד";
t3.innerText="דוח משמרת";
}
if(l==="ru"){
t1.innerText="Кто менеджер";
t2.innerText="Введите PIN";
t3.innerText="Отчет смены";
}
}

/* NAV */
function show(id){
["users","pin","form","done"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

/* USER */
function selectUser(name){
user=name;
pin="";
updatePin();
show("pin");
}

/* PIN PAD */
const pad=document.getElementById("pad");

[1,2,3,4,5,6,7,8,9,"←",0].forEach(n=>{
const b=document.createElement("div");
b.className="pin-btn";
b.innerText=n;

b.onclick=()=>{
if(n==="←"){pin=pin.slice(0,-1);}
else if(pin.length<4){pin+=n;}

updatePin();

if(pin.length===4){
setTimeout(()=>{
show("form");
document.getElementById("date").valueAsDate=new Date();
},200);
}
};

pad.appendChild(b);
});

/* PIN UI */
function updatePin(){
const cells=document.querySelectorAll(".pin-cell");
cells.forEach((c,i)=>{
c.innerHTML = i < pin.length ? "<div class='pin-dot'></div>" : "";
});
}

/* SEND */
async function send(){

const data={
user,
date:date.value,
shift:shift.value,
ready:ready.value,
summary:summary.value,
problem:problem.value
};

await fetch("https://script.google.com/macros/s/AKfycby6ddtcg8sgvlX_9H33b3cQM2pslzMSxCntDvxgCTXjM5ztPd3HSLYUx9KxOtOiV9Q/exec",{
method:"POST",
body:JSON.stringify(data)
});

show("done");
}

</script>

</body>
</html>
